<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Last Letter</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <section id="welcome" class="page">

            <h1>有一封信想送給你</h1>

            <p>這封信，只想留給你。</p>

            <button id="startBtn">打開這封信</button>

        </section>

        <section id="gallery" class="page" style="display:none;">

            <h2>一起走過的回憶</h2>

            <div id="mediaContainer"></div>

            <button id="nextBtn">下一步</button>

        </section>

        <section id="letter" class="page" style="display:none;">

            <h2>想對你說的話</h2>

            <div id="letterContent"></div>

        </section>

    </div>

    <script src="js/main.js"></script>

</body>

</html>
